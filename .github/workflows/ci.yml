name: CI

# Fast, hermetic verification on every push and PR: lint, unit tests, and a
# production build. No browser needed.

on:
  push:
  pull_request:
  workflow_dispatch: {}

# Only keep the latest run per branch/PR; cancel superseded ones to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun test
      - run: bun run build  # includes tsc -b on the main app
      # The Aseprite extension shares src/lib/svg.ts — type-check it separately and
      # verify it still packages, so a signature change in svg.ts can't break it silently.
      - run: bunx tsc --noEmit -p aseprite-ext/tsconfig.json
      - run: bun run build:ext
